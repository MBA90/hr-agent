    password: hdninuilpdncjuia
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

ollama:
  base-url: http://localhost:11434
  model: llama3.2:latest
  timeout: 120s
  temperature: 0.3

hr:
