server:
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: jdbc:oracle:thin:@localhost:1521/ORCLPDB1
    username: hr_agent
    password: ${DB_PASSWORD:admin}
    driver-class-name: oracle.jdbc.OracleDriver

  jpa:
    hibernate:
      ddl-auto: none               # Liquibase manages all DDL — Hibernate must not interfere
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
    open-in-view: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true
    default-schema: hr_agent       # Must match your Oracle schema/username

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your.email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

ollama:
  base-url: http://localhost:11434
  model: llama3.2:latest
  timeout: 120s
  temperature: 0.3

hr:
  agent:
    min-score-threshold: 60
    cv-storage-path: ${CV_STORAGE_PATH:./cv-uploads/}
    memory-max-messages: 20
  password-reset:
    expiration-minutes: 60
    reset-url: ${PASSWORD_RESET_URL:http://localhost:3000/reset-password}

security:
  jwt:
    secret: ${JWT_SECRET:hr-agent-super-secret-key-must-be-at-least-32-chars!!}
    expiration: 86400000   # 24 hours in milliseconds

logging:
  level:
    root: INFO
    com.hr.agent: DEBUG
    dev.langchain4j: DEBUG
